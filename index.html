<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حفصة 💖</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .screen {
            width: 100vw;
            min-height: 100vh;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            position: relative;
            overflow: hidden;
        }

        /* ===== الواجهة الأولى ===== */
        #screen-question {
            background: radial-gradient(ellipse at center, #1a0033 0%, #0d001a 50%, #000000 100%);
        }

        .particles-bg {
            position: absolute;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle-heart {
            position: absolute;
            animation: floatParticle 6s infinite;
            opacity: 0.3;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg) scale(0); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) rotate(720deg) scale(2); opacity: 0; }
        }

        .question-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255,105,180,0.4);
            border-radius: 30px;
            padding: 50px 60px;
            animation: cardFloat 4s ease-in-out infinite;
            box-shadow: 0 20px 60px rgba(255,20,147,0.3), inset 0 0 30px rgba(255,255,255,0.05);
            z-index: 1;
            text-align: center;
            position: relative;
        }

        @keyframes cardFloat {
            0%, 100% { transform: rotateX(5deg) rotateY(-5deg) translateY(0); }
            50% { transform: rotateX(8deg) rotateY(-8deg) translateY(-20px); }
        }

        .question-card::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 35px;
            background: linear-gradient(45deg, #ff1493, #ff6b9d, #ff1493);
            background-size: 400% 400%;
            animation: borderGlow 3s ease-in-out infinite;
            z-index: -1;
            filter: blur(10px);
        }

        @keyframes borderGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .question-text {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b9d, #ff1493, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textGlow 2s ease-in-out infinite;
            letter-spacing: 2px;
        }

        @keyframes textGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(255,20,147,0.8)); }
            50% { filter: drop-shadow(0 0 40px rgba(255,20,147,1)); }
        }

        .small-hearts-row {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            justify-content: center;
            animation: floatRow 3s ease-in-out infinite;
        }

        @keyframes floatRow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .small-heart {
            font-size: 2.5rem;
            animation: heartBeat 1.5s ease-in-out infinite;
        }
        .small-heart:nth-child(2) { animation-delay: 0.2s; }
        .small-heart:nth-child(3) { animation-delay: 0.4s; }
        .small-heart:nth-child(4) { animation-delay: 0.6s; }
        .small-heart:nth-child(5) { animation-delay: 0.8s; }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.3); }
            75% { transform: scale(1.2); }
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
            z-index: 1;
        }

        .btn-3d {
            padding: 20px 60px;
            font-size: 1.8rem;
            font-weight: 800;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            min-width: 350px;
        }

        .btn-yes-green {
            background: linear-gradient(135deg, #00e676, #00c853);
            color: white;
            animation: greenGlow 2s ease-in-out infinite;
        }

        @keyframes greenGlow {
            0%, 100% { box-shadow: 0 15px 40px rgba(0,230,118,0.5); }
            50% { box-shadow: 0 20px 60px rgba(0,230,118,0.9); }
        }

        .btn-yes-red {
            background: linear-gradient(135deg, #ff1744, #d50000);
            color: white;
            animation: redGlow 2s ease-in-out infinite;
        }

        @keyframes redGlow {
            0%, 100% { box-shadow: 0 15px 40px rgba(255,23,68,0.5); }
            50% { box-shadow: 0 20px 60px rgba(255,23,68,0.9); }
        }

        .btn-no {
            background: linear-gradient(135deg, #607d8b, #455a64);
            color: #ccc;
            font-size: 1.3rem;
            padding: 15px 40px;
            min-width: 200px;
            box-shadow: 0 10px 30px rgba(96,125,139,0.4);
        }

        .btn-3d:hover { transform: scale(1.08); filter: brightness(1.2); }
        .btn-3d:active { transform: scale(0.95); }

        /* ===== الواجهة الثانية - القلوب ===== */
        #screen-hearts {
            background: radial-gradient(ellipse at center, #ff1a66 0%, #b3003b 40%, #4d0019 100%);
        }

        .big-3d-heart-container {
            width: 200px;
            height: 200px;
            animation: heart3DRotate 8s linear infinite;
        }

        @keyframes heart3DRotate {
            0% { transform: rotateY(0deg) rotateX(20deg); }
            100% { transform: rotateY(360deg) rotateX(20deg); }
        }

        .heart-3d-face {
            font-size: 8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 0 30px rgba(255,0,100,0.8));
        }

        .hearts-text-3d {
            font-size: 2.8rem;
            font-weight: 900;
            color: #fff;
            text-align: center;
            padding: 0 20px;
            animation: text3DFloat 2s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes text3DFloat {
            0%, 100% { text-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 40px rgba(255,20,147,0.6); }
            50% { text-shadow: 0 0 40px rgba(255,255,255,1), 0 0 80px rgba(255,20,147,0.9); }
        }

        .hearts-rain-container {
            position: absolute;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .rain-heart {
            position: absolute;
            animation: rainFall linear infinite;
            filter: drop-shadow(0 0 10px rgba(255,50,100,0.8));
        }

        @keyframes rainFall {
            0% { transform: translateY(-10vh) rotate(0deg) scale(0); opacity: 1; }
            50% { transform: translateY(50vh) rotate(180deg) scale(1.2); opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg) scale(0.3); opacity: 0; }
        }

        /* ===== الواجهة الثالثة - الرفض ===== */
        #screen-no {
            background: radial-gradient(ellipse at center, #2c3e50 0%, #1a1a2e 50%, #000000 100%);
        }

        .sad-scene {
            animation: sadFloat 4s ease-in-out infinite;
            text-align: center;
        }

        @keyframes sadFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .broken-heart {
            font-size: 8rem;
            animation: breakHeart 2s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255,0,0,0.5));
        }

        @keyframes breakHeart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        .no-text-3d {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255,107,107,0.8);
            animation: sadPulse 2s ease-in-out infinite;
            padding: 10px 20px;
            text-align: center;
        }

        @keyframes sadPulse {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }

        .rain-drops {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        .drop {
            position: absolute;
            top: -20px;
            animation: rain linear infinite;
            color: rgba(150,200,255,0.4);
            font-size: 1.5rem;
        }

        @keyframes rain { to { transform: translateY(100vh); } }

        .glow-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255,105,180,0.3);
            animation: ringPulse 3s ease-out infinite;
            pointer-events: none;
        }

        @keyframes ringPulse {
            0% { width: 100px; height: 100px; opacity: 0.8; }
            100% { width: 400px; height: 400px; opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- الواجهة الأولى: السؤال -->
    <div id="screen-question" class="screen">
        <div class="particles-bg" id="particlesBg"></div>
        <div class="glow-ring" style="top:20%;left:10%;"></div>
        <div class="glow-ring" style="top:60%;right:15%;animation-delay:1.5s;"></div>

        <div class="question-card">
            <div class="small-hearts-row">
                <span class="small-heart">💕</span>
                <span class="small-heart">💗</span>
                <span class="small-heart">💖</span>
                <span class="small-heart">💘</span>
                <span class="small-heart">💝</span>
            </div>
            <div class="question-text">واش كتبغيني احفصة ؟</div>
            <div class="small-hearts-row">
                <span class="small-heart">💟</span>
                <span class="small-heart">♥️</span>
                <span class="small-heart">💓</span>
                <span class="small-heart">💞</span>
                <span class="small-heart">💌</span>
            </div>
        </div>

        <div class="buttons-container">
            <button class="btn-3d btn-yes-green" onclick="showHearts('green')">
                💚 اه
            </button>
            <button class="btn-3d btn-yes-red" onclick="showHearts('red')">
                ❤️ اه و لكن بالأحمر
            </button>
            <button class="btn-3d btn-no" onclick="showNo()">
                💔 لا
            </button>
        </div>
    </div>

    <!-- الواجهة الثانية: القلوب -->
    <div id="screen-hearts" class="screen">
        <div class="hearts-rain-container" id="heartsRain"></div>
        <div class="glow-ring" style="top:10%;left:20%;"></div>
        <div class="glow-ring" style="bottom:15%;right:10%;animation-delay:1s;"></div>

        <div class="big-3d-heart-container">
            <div class="heart-3d-face" id="mainHeart">❤️‍🔥</div>
        </div>

        <div class="hearts-text-3d">
            يالاه اعطيني بوسة 😘💕
        </div>
    </div>

    <!-- الواجهة الثالثة: الرفض -->
    <div id="screen-no" class="screen">
        <div class="rain-drops" id="rainDrops"></div>
        <div class="sad-scene">
            <div class="broken-heart">💔</div>
            <div class="no-text-3d">لميمة احليبيش لميمة 😢</div>
            <div class="no-text-3d" style="font-size:1.8rem;color:#a0c4ff;margin-top:20px;">
                غندعي معاك تنجحي ف S4 🤲📚
            </div>
        </div>
    </div>

    <script>
        function createParticles() {
            const container = document.getElementById('particlesBg');
            const hearts = ['❤️','💕','💗','💖','💘','💝','💟','💓','💞','💌','♥️'];
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('span');
                p.className = 'particle-heart';
                p.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 6 + 's';
                p.style.animationDuration = (4 + Math.random() * 8) + 's';
                p.style.fontSize = (1 + Math.random() * 3) + 'rem';
                container.appendChild(p);
            }
        }

        function createHeartsRain() {
            const container = document.getElementById('heartsRain');
            const hearts = ['❤️','💕','💗','💖','💘','💝','💟','💓','💞','💌','♥️','❤️‍🔥'];
            container.innerHTML = '';
            for (let i = 0; i < 60; i++) {
                const h = document.createElement('span');
                h.className = 'rain-heart';
                h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                h.style.left = Math.random() * 100 + '%';
                h.style.animationDelay = Math.random() * 4 + 's';
                h.style.animationDuration = (2 + Math.random() * 5) + 's';
                h.style.fontSize = (1.5 + Math.random() * 3) + 'rem';
                container.appendChild(h);
            }
        }

        function createRainDrops() {
            const container = document.getElementById('rainDrops');
            container.innerHTML = '';
            const drops = ['💧','💦','🌧️','💧'];
            for (let i = 0; i < 40; i++) {
                const d = document.createElement('span');
                d.className = 'drop';
                d.textContent = drops[Math.floor(Math.random() * drops.length)];
                d.style.left = Math.random() * 100 + '%';
                d.style.animationDelay = Math.random() * 3 + 's';
                d.style.animationDuration = (1 + Math.random() * 2) + 's';
                container.appendChild(d);
            }
        }

        function hideAll() {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        }

        function showHearts(color) {
            hideAll();
            // اللون حسب الزر
            if (color === 'red') {
                document.getElementById('mainHeart').textContent = '❤️';
                document.getElementById('screen-hearts').style.background = 
                    'radial-gradient(ellipse at center, #cc0000 0%, #800000 40%, #2d0000 100%)';
            } else {
                document.getElementById('mainHeart').textContent = '❤️‍🔥';
                document.getElementById('screen-hearts').style.background = 
                    'radial-gradient(ellipse at center, #ff1a66 0%, #b3003b 40%, #4d0019 100%)';
            }
            document.getElementById('screen-hearts').style.display = 'flex';
            createHeartsRain();
            setInterval(createHeartsRain, 6000);
        }

        function showNo() {
            hideAll();
            document.getElementById('screen-no').style.display = 'flex';
            createRainDrops();
        }

        window.onload = function() {
            createParticles();
            document.getElementById('screen-question').style.display = 'flex';
        };
    </script>
</body>
</html>
